<nav class="w-full bg-white border-b border-default">

  <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">

    <!-- LOGO -->
    <a routerLink="/" class="flex items-center">
      <img
        src="assets/images/logo/logo_dark.svg"
        alt="Logo"
        class="h-8 w-auto"
      >
    </a>

    <!-- DESKTOP MENU -->
    <div class="hidden md:flex items-center gap-4 text-muted">

      <app-tooltip
        *ngFor="let item of menuItems"
        [text]="item.label"
      >
        <a
          [routerLink]="item.route"
          routerLinkActive="nav-link-active"
          [routerLinkActiveOptions]="{ exact: item.route === '/' }"
          class="group nav-link"
        >
          <app-icon
            [name]="item.icon"
            size="w-5 h-5 transition-transform duration-200 group-hover:scale-110">
          </app-icon>
        </a>
      </app-tooltip>

    </div>

    <!-- HAMBURGER -->
    <button
      class="md:hidden relative w-10 h-10 flex items-center justify-center"
      (click)="toggleMobileMenu()"
    >

      <span
        class="hamburger-line"
        [class.rotate-45]="isMobileMenuOpen"
        [class.translate-y-0]="isMobileMenuOpen"
        [class.-translate-y-2]="!isMobileMenuOpen">
      </span>

      <span
        class="hamburger-line"
        [class.opacity-0]="isMobileMenuOpen">
      </span>

      <span
        class="hamburger-line"
        [class.-rotate-45]="isMobileMenuOpen"
        [class.translate-y-0]="isMobileMenuOpen"
        [class.translate-y-2]="!isMobileMenuOpen">
      </span>

    </button>

  </div>

  <!-- MOBILE MENU -->
  <div
    class="md:hidden overflow-hidden transition-all duration-300"
    [class.max-h-0]="!isMobileMenuOpen"
    [class.max-h-96]="isMobileMenuOpen"
  >

    <div
      class="border-t border-default bg-white px-6 py-4 flex flex-col gap-2
             transition-all duration-300"
      [class.opacity-0]="!isMobileMenuOpen"
      [class.opacity-100]="isMobileMenuOpen"
      [class.-translate-y-2]="!isMobileMenuOpen"
      [class.translate-y-0]="isMobileMenuOpen"
    >

      <a
        *ngFor="let item of menuItems"
        [routerLink]="item.route"
        routerLinkActive="nav-link-active"
        (click)="toggleMobileMenu()"
        class="group nav-mobile-link"
      >

        <app-icon
          [name]="item.icon"
          size="w-5 h-5 transition-transform duration-200 group-hover:scale-110">
        </app-icon>

        <span
          class="transition-transform duration-200 group-hover:translate-x-1">
          {{ item.label }}
        </span>

      </a>

    </div>

  </div>

</nav>
